name: Quality Checks

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run repo checks
        run: deno task check

      - name: Compile smoke binary
        run: |
          mkdir -p dist
          deno compile -A --output dist/superctl main.ts
          ./dist/superctl help
