name: Quality Checks

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    name: Superctl Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run superctl gate
        run: deno run -A main.ts gate

  verify:
    name: Superctl Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run superctl verify
        run: deno run -A main.ts verify

  audit:
    name: Superctl Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run superctl audit
        run: deno run -A main.ts audit
