name: Quality Checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-version:
    name: Release Version Available
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch remote tags
        run: git fetch --force --tags origin

      - name: Verify deno.json version has not been tagged
        run: |
          version="$(node -p "require('./deno.json').version")"
          if [ -z "${version}" ]; then
            echo "::error::deno.json must define a non-empty version string."
            exit 1
          fi

          canonical_tag="v${version}"
          legacy_tag="${version}"

          if git rev-parse -q --verify "refs/tags/${canonical_tag}" >/dev/null; then
            echo "::error::deno.json version ${version} already has release tag ${canonical_tag}. Bump deno.json version before merging."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${legacy_tag}" >/dev/null; then
            echo "::error::deno.json version ${version} already has legacy release tag ${legacy_tag}. Bump deno.json version before merging."
            exit 1
          fi

          echo "Version ${version} is available for release tagging."

  standards:
    name: Quality Standards
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run deno fmt
        run: deno fmt --check .

      - name: Run deno lint
        run: deno lint --config deno.json .

  build:
    name: Build And Compile
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run build task
        run: deno task build

      - name: Compile binary
        run: deno task compile

      - name: Smoke test compiled binary
        run: ./dist/superctl help

  gate:
    name: Superctl Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run repo gate
        run: deno task ci:gate

  test:
    name: Superctl Test
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run repo test
        run: deno task ci:test

  audit:
    name: Superctl Audit
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise toolchain
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          cache: true

      - name: Run deno audit
        run: deno audit --level=high

      - name: Run repo audit
        run: deno task ci:audit
